openapi: 3.0.3
info:
  title: OTAPa Backend API
  version: 1.0.0
  description: |
    API specification for the OTAPa proctoring and test management backend.
servers:
  - url: http://localhost:8000
    description: Local development server
paths:
  /api/v1/users/registerUser:
    post:
      summary: Register a new student or teacher and send OTP email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserRequest'
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWithUserSummary'
        '400':
          description: Validation error or user already exists
        '500':
          description: Email or Redis storage failure
  /api/v1/users/auth/createUser:
    post:
      summary: Validate OTP and create the user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
      responses:
        '200':
          description: Student account created and authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWithUser'
        '201':
          description: Teacher account created awaiting approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmpty'
        '400':
          description: Incorrect OTP
        '404':
          description: OTP expired or user not found
        '500':
          description: Creation failed
  /api/v1/users/auth/forgetPassword:
    post:
      summary: Send a password reset OTP to email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetEmailResponse'
        '401':
          description: Missing email
        '404':
          description: User not found
        '500':
          description: Email or service failure
  /api/v1/users/auth/resetPassword:
    post:
      summary: Reset password using OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmpty'
        '400':
          description: Invalid data, OTP expired, or invalid OTP
        '500':
          description: Reset failed
  /api/v1/users/auth/loginUser:
    post:
      summary: Log in a web user and issue session cookies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: User logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWithUser'
        '400':
          description: Missing credentials
        '403':
          description: Account not approved
        '404':
          description: Invalid credentials or already logged in
        '500':
          description: Token save failure
  /api/v1/users/auth/logoutUser:
    post:
      summary: Log out web user and clear session cookies
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmptyString'
        '500':
          description: Logout failed
  /api/v1/users/auth/refreshToken:
    post:
      summary: Refresh access token using refresh token
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '404':
          description: Missing or invalid refresh token
        '501':
          description: Refresh failure
  /api/v1/users/auth/desktop/login:
    post:
      summary: Log in a desktop client and receive bearer token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Desktop login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWithString'
        '400':
          description: Missing credentials
        '403':
          description: Account not approved
        '404':
          description: Invalid credentials or already logged in
  /api/v1/users/auth/desktop/logout:
    post:
      summary: Log out a desktop client
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Desktop logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmpty'
  /api/v1/users/auth/desktop/testProgress:
    post:
      summary: Store desktop test progress in Redis
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [testId, mcqsAns, theoreticalAns, startTime]
              properties:
                testId:
                  type: string
                mcqsAns:
                  type: array
                  items:
                    type: object
                theoreticalAns:
                  type: array
                  items:
                    type: object
                startTime:
                  type: string
      responses:
        '200':
          description: Progress stored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmpty'
  /api/v1/users/attemptList:
    get:
      summary: Retrieve authenticated student's test attempts
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttemptListResponse'
        '404':
          description: No attempt records found
  /api/v1/users/desktop/joinTest:
    post:
      summary: Join a desktop test after validation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [testCode, lat, lng]
              properties:
                testCode:
                  type: string
                lat:
                  type: number
                lng:
                  type: number
      responses:
        '200':
          description: Allowed to join the test
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmpty'
        '400':
          description: Missing parameters
        '403':
          description: Join denied due to timing, repeat attempt, or location
        '404':
          description: Test not found
  /api/v1/users/desktop/submitTest:
    post:
      summary: Submit desktop test answers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitTestRequest'
      responses:
        '202':
          description: Test submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmpty'
  /api/v1/teacher/createTest:
    post:
      summary: Create a new test with questions
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTestRequest'
      responses:
        '201':
          description: Test created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestCodeResponse'
        '403':
          description: Forbidden role
        '500':
          description: Creation failure
  /api/v1/teacher/getAllTests:
    get:
      summary: Get paginated tests created by the authenticated teacher or admin
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
          description: Page number (default 1)
      responses:
        '200':
          description: List of tests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestListResponse'
        '500':
          description: No tests found
  /api/v1/teacher/getTestDetails/{testId}:
    get:
      summary: Retrieve test details and questions
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: testId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Test details fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWithTestDetails'
        '401':
          description: Missing testId
        '403':
          description: Permission denied
        '500':
          description: Test not found
  /api/v1/teacher/seeAllAttendees/{testId}:
    get:
      summary: Get students who attempted a test
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: testId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Student attendee list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendeeListResponse'
        '400':
          description: Test ID missing
  /api/v1/admin/adminHandler/{teacherId}:
    post:
      summary: Toggle teacher/admin role
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: teacherId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Role toggled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmpty'
        '403':
          description: Forbidden role
  /api/v1/admin/approveTeacher/{teacherId}:
    post:
      summary: Approve a teacher account
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: teacherId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Teacher approved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmpty'
        '403':
          description: Forbidden role
  /api/v1/admin/removeTeacher/{teacherId}:
    post:
      summary: Remove a teacher account
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: teacherId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Teacher removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmpty'
  /api/v1/admin/getTeachersList:
    get:
      summary: Get all verified teachers and admins
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Teachers list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherListResponse'
  /api/v1/admin/getAllTests/{teacherId}:
    get:
      summary: Get all tests created by a teacher
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: teacherId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Teacher tests list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestListResponse'
  /api/v1/admin/getTestDetails/{testId}:
    get:
      summary: Get test details for admin
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: testId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Test details fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWithTestDetails'
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiResponseBase:
      type: object
      properties:
        success:
          type: boolean
        statusCode:
          type: integer
        data:
          type: object
          nullable: true
        message:
          type: string
    ApiResponseEmpty:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - properties:
            data:
              type: object
              example: {}
    ApiResponseEmptyString:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - properties:
            data:
              type: string
              example: ""
    ApiResponseWithString:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - properties:
            data:
              type: string
              example: "<token>"
    ApiResponseWithUser:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - properties:
            data:
              $ref: '#/components/schemas/User'
    ApiResponseWithUserSummary:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - properties:
            data:
              type: object
              properties:
                email:
                  type: string
                  format: email
                fullname:
                  type: string
    RegisterUserRequest:
      type: object
      required: [fullname, email, number, password, role, department]
      properties:
        fullname:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        number:
          type: integer
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [student, teacher]
        department:
          type: string
        batch:
          type: string
        regNo:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    ResetPasswordRequest:
      type: object
      required: [email, newPassword, otp]
      properties:
        email:
          type: string
          format: email
        newPassword:
          type: string
          minLength: 8
        otp:
          type: integer
          minimum: 10000
    ResetEmailResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - properties:
            data:
              type: object
              properties:
                email:
                  type: string
                  format: email
                fullname:
                  type: string
    RefreshTokenResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - properties:
            data:
              type: object
              properties:
                refreshToken:
                  type: string
    User:
      type: object
      properties:
        _id:
          type: string
        fullname:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [student, teacher, admin, superAdmin]
        department:
          type: string
        batch:
          type: string
        regNo:
          type: string
        isUserVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AttemptItem:
      type: object
      properties:
        _id:
          type: string
        studentId:
          type: string
        testId:
          type: object
          properties:
            _id:
              type: string
            title:
              type: string
            subjectCode:
              type: string
        obtainedMarks:
          type: number
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
    AttemptListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/AttemptItem'
    SubmitTestRequest:
      type: object
      required: [mcqsAns, theoreticalAns, startTime, submitTime]
      properties:
        mcqsAns:
          type: array
          items:
            type: object
            properties:
              questionId:
                type: string
              selectedOption:
                type: integer
                minimum: 0
                maximum: 4
        theoreticalAns:
          type: array
          items:
            type: object
            properties:
              questionId:
                type: string
              ans:
                type: string
        startTime:
          type: string
          format: date-time
        submitTime:
          type: string
          format: date-time
    CreateTestRequest:
      type: object
      required: [title, subjectCode, duration, questions, startTime, endTime, allowedLocation]
      properties:
        title:
          type: string
          minLength: 6
        subjectCode:
          type: string
          minLength: 6
        duration:
          type: number
          minimum: 10
        totalMarks:
          type: number
          minimum: 0
          maximum: 100
        questions:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/Question'
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        allowedLocation:
          type: object
          required: [lat, lng, radius]
          properties:
            lat:
              type: number
            lng:
              type: number
            radius:
              type: number
    Question:
      type: object
      required: [questionType, questionText, marks]
      properties:
        questionType:
          type: string
          enum: [mcq, theory]
        questionText:
          type: string
          minLength: 5
        options:
          type: array
          items:
            type: string
        correctOption:
          type: integer
          minimum: 0
          maximum: 3
        marks:
          type: number
          minimum: 1
    TestCodeResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - properties:
            data:
              type: object
              properties:
                testCode:
                  type: integer
    TestListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - properties:
            data:
              type: array
              items:
                type: object
                properties:
                  _id:
                    type: string
                  title:
                    type: string
                  testCode:
                    type: number
    ApiResponseWithTestDetails:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - properties:
            data:
              type: object
              properties:
                _id:
                  type: string
                title:
                  type: string
                subjectCode:
                  type: string
                duration:
                  type: number
                totalMarks:
                  type: number
                testCode:
                  type: number
                startTime:
                  type: string
                  format: date-time
                endTime:
                  type: string
                  format: date-time
                allowedLocation:
                  type: object
                  properties:
                    lat:
                      type: number
                    lng:
                      type: number
                    radius:
                      type: number
                questions:
                  type: array
                  items:
                    $ref: '#/components/schemas/Question'
    AttendeeListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - properties:
            data:
              type: array
              items:
                type: object
                properties:
                  studentId:
                    type: object
                    properties:
                      _id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                        format: email
    TeacherListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - properties:
            data:
              type: array
              items:
                type: object
                properties:
                  _id:
                    type: string
                  fullname:
                    type: string
                  role:
                    type: string
                  email:
                    type: string
                    format: email
